<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>出勤打刻</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    /* ローディング画面のシンプルなデザイン */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f6f6;
      font-family: sans-serif;
      color: #333;
    }
    .spinner {
      border: 4px solid #e0e0e0;
      border-top: 4px solid #06c755; /* LINEグリーン */
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #status-text {
      font-size: 16px;
      font-weight: bold;
    }
    #error-message {
      color: #ff334b;
      margin-top: 20px;
      font-size: 14px;
      text-align: center;
      padding: 0 20px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div id="initial-view">
    <button id="clock-in-btn" style="padding: 15px 40px; font-size: 18px; background-color: #06c755; color: white; border: none; border-radius: 8px; cursor: pointer;">出勤する</button>
  </div>
  
  <div class="spinner" id="spinner" style="display: none;"></div>
  <div id="status-text"></div>
  <div id="error-message"></div>

  <script src="index.js"></script>
</body>
</html>
